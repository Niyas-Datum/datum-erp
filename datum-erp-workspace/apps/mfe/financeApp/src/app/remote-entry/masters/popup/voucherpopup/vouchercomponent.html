<div class="voucher-numbering-popup">
  <!-- Toolbar -->
  <div class="toolbar">
    <button type="button" class="e-btn e-btn-sm e-outline" (click)="onNew()">
      <span class="e-btn-icon e-icons e-add"></span>
      New
    </button>
    <button type="button" class="e-btn e-btn-sm e-outline" (click)="onSave()">
      <span class="e-btn-icon e-icons e-save"></span>
      Save
    </button>
    <button type="button" class="e-btn e-btn-sm e-outline" (click)="onEdit()">
      <span class="e-btn-icon e-icons e-edit"></span>
      Edit
    </button>
    <button type="button" class="e-btn e-btn-sm e-outline e-danger" (click)="onDelete()">
      <span class="e-btn-icon e-icons e-trash"></span>
      Delete
    </button>
  </div>

  <!-- Form Fields -->
  <div class="form-container">
    <div class="form-group">
      <label for="numberingId">ID</label>
      <ejs-textbox
        id="numberingId"
        [value]="currentRecord?.id"
        format="n0"
        [readonly]="true"
        [enabled]="false">
      </ejs-textbox>
    </div>
    <div class="form-group">
      <label for="startingNo">Starting No.</label>
      <ejs-textbox
        id="startingNo"
        [(ngModel)]="currentRecord.startingNumber"
        [enabled]="!isInputDisabled"
        format="n0"
        placeholder="Starting No.">
      </ejs-textbox>
    </div>
    <div class="form-group">
      <label for="maxDigits">Max. Digits</label>
      <ejs-textbox
        id="maxDigits"
        [(ngModel)]="currentRecord.maximumDegits"
        [enabled]="!isInputDisabled"
        format="n0"
        placeholder="Max. Digits">
      </ejs-textbox>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <div class="nav-controls">
      <button type="button" class="e-btn e-btn-sm e-flat" (click)="goFirst()" [disabled]="numberingData.length === 0">
        <span class="e-btn-icon e-icons e-move-first"></span>
      </button>
      <button type="button" class="e-btn e-btn-sm e-flat" (click)="goPrevious()" [disabled]="currentIndex <= 0">
        <span class="e-btn-icon e-icons e-move-previous"></span>
      </button>
      <ejs-numerictextbox
        #recordInput
        [(ngModel)]="currentIndexDisplay"
        [min]="1"
        [max]="totalRecords"
        format="n0"
        [showSpinButton]="false"
        (change)="onRecordIndexChange($event)"
        class="record-index-input">
      </ejs-numerictextbox>
      <span class="of-text">of {{ totalRecords }}</span>
      <button type="button" class="e-btn e-btn-sm e-flat" (click)="goNext()" [disabled]="currentIndex >= totalRecords - 1">
        <span class="e-btn-icon e-icons e-move-next"></span>
      </button>
      <button type="button" class="e-btn e-btn-sm e-flat" (click)="goLast()" [disabled]="numberingData.length === 0">
        <span class="e-btn-icon e-icons e-move-last"></span>
      </button>
    </div>
    <button type="button" class="e-btn e-btn-sm e-success" (click)="onApply()">
      <span class="e-btn-icon e-icons e-check"></span>
      Apply
    </button>
  </div>
</div>
