<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<div class="container-fluid">

  <!-- HEADER -->
  <div class="row align-items-center">

    <!-- LEFT SECTION -->
    <div class="col-12 col-md-2">
      <div class="d-flex align-items-center gap-2">

        <!-- Toggle Button -->
        <div [ngSwitch]="pageType">
          <div *ngSwitchCase="1">
            <button (click)="toggleSidebar()" class="e-btn-sm">
              <span class="e-icons e-menu"></span>
            </button>
          </div>
        </div>

        <!-- Page Heading -->
        <div class="fs-6 fw-medium text-secondary">
          {{ pageheading }}
        </div>


      </div>
    </div>

    <!-- TOOLBAR SECTION -->
    <div class="col-12 col-md-10">
      <app-form-toolbar [isNewMode]="isNewMode" [isEditMode]="isEditMode" [isNewBtnDisabled]="isNewBtnDisabled"
        [isEditBtnDisabled]="isEditBtnDisabled" [isDeleteBtnDisabled]="isDeleteBtnDisabled"
        [isSaveBtnDisabled]="isSaveBtnDisabled" [isPrintBtnDisabled]="isPrintBtnDisabled" (new)="onNewClick()"
        (delete)="onDeleteClick()" (save)="onSaveClick()" (print)="onPrintClick()" (edit)="onEditClick()">
      </app-form-toolbar>
    </div>

  </div>

  <div [ngSwitch]="pageType">

    <!-- DEFAULT PAGE WITH SIDEBAR -->
    <div *ngSwitchDefault>

      <section class="leftgrid-section overflow-hidden">

        <!-- SIDEBAR -->
        <ejs-sidebar id="sideTree" [(isOpen)]="isSidebarVisible" [width]="width" [target]="target"
          [mediaQuery]="mediaQuery" [type]="sidebarType" position="Left" class="overflow-hidden">

          <div class="p-2">
            <app-left-grid (rowSelected)="onCostCategorySelected($event)" [columns]="leftgridchildData.columns">
            </app-left-grid>
          </div>
        </ejs-sidebar>

        <!-- MAIN CONTENT -->
        <div class="main-content-wrapper px-2 w-100">
          <div class="row">

            <div class="col-12 transition-col">

              <div class="odoo-form-bg row" style="background: #fff;
                        border-radius: 4px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.04);">

                <router-outlet></router-outlet>
              </div>
            </div>
          </div>
        </div>
       

      </section>
    </div>

    <!-- PAGE TYPE 2 -->
    <div *ngSwitchCase="2" class="mt-3" style="background: #fff;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                padding: 24px 18px;
                margin-bottom: 18px;">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
<!-- END CONTAINER -->


<!-- Dialog -->
<div id="dialogContainer">
  <div id="alertDialog" #dialogAlert></div>
</div>

<!-- Popup container -->
<app-popup-container></app-popup-container>
