<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<div class="container-fluid vh-100 d-flex flex-column overflow-hidden p-0">
  <div class="row align-items-center g-0 flex-shrink-0 border-bottom bg-light">
    <div class="col-12 col-md-2 ps-3">
      <div class="d-flex align-items-center gap-2">
        <div [ngSwitch]="pageType">
          <div *ngSwitchCase="1">
            <button (click)="toggleSidebar()" class="e-btn-sm e-flat">
              <span class="e-icons e-menu"></span>
            </button>
          </div>
        </div>
        <div class="fs-6 fw-medium text-secondary text-nowrap">
          {{ pageheading }}
        </div>
      </div>
    </div>

    <div class="col-12 col-md-10">
      <app-form-toolbar [isNewMode]="isNewMode" [isEditMode]="isEditMode" [isNewBtnDisabled]="isNewBtnDisabled"
        [isEditBtnDisabled]="isEditBtnDisabled" [isDeleteBtnDisabled]="isDeleteBtnDisabled"
        [isSaveBtnDisabled]="isSaveBtnDisabled" [isPrintBtnDisabled]="isPrintBtnDisabled" (new)="onNewClick()"
        (delete)="onDeleteClick()" (save)="onSaveClick()" (print)="onPrintClick()" (edit)="onEditClick()">
      </app-form-toolbar>
    </div>
  </div>

  <div [ngSwitch]="pageType" class="flex-grow-1 overflow-hidden">

    <div *ngSwitchDefault class="h-100">
      <section class="d-flex flex-row h-100 overflow-hidden">

        <ejs-sidebar id="sideTree" [(isOpen)]="isSidebarVisible" [width]="width" [target]="target"
          [mediaQuery]="mediaQuery" [type]="sidebarType" position="Left">
          <div class="p-2 h-100">
            <app-left-grid (rowSelected)="onCostCategorySelected($event)" [columns]="leftgridchildData.columns">
            </app-left-grid>
          </div>
        </ejs-sidebar>
        <div class="main-content-wrapper flex-grow-1 bg-light">
          <div class="odoo-form-bg shadow-sm"
            style="background: #fff; border-radius: 4px; min-height: 100%; width: auto;">
            <router-outlet></router-outlet>
          </div>
        </div>

      </section>
    </div>

    <div *ngSwitchCase="2" class="p-0">
      <div style="background: #fff;
                border-radius: 4px;">
        <router-outlet></router-outlet>
      </div>
    </div>

  </div>

</div>
<div id="dialogContainer">
  <div id="alertDialog" #dialogAlert></div>
</div>
<app-popup-container></app-popup-container>
