<div class="row">
  <div class="col-md-12 ">

    <app-invoice-header (formSubmitted)="handleInvoiceHeaderForm($event)"></app-invoice-header>

    <!-- BR Section -->
    <div class="row justify-content-end align-items-end g-2">

      <div class="col-6 col-md-auto">
        <button class="btn-br-custom rounded w-100" (click)="onBarcodeClick()">BR</button>
      </div>

      <div class="col-6 col-md-auto d-flex align-items-center gap-2">
        <label class="mb-0">Gross Amount Edit</label>
        <input type="checkbox" [checked]="isGrossAmountEditable" (change)="onGrossAmountEditChange($event)">
      </div>

      <div class="col-6 col-md-auto d-flex align-items-center gap-2">
        <label class="mb-0">Approve</label>
        <input type="checkbox" [checked]="isApproved" (change)="onApproveChange($event)">
      </div>

      <div class="col-6 col-md-auto">
        Party Balance : {{ partyBalance }}
      </div>

    </div>


  </div>
  <hr />
  <div class="col-md-12">

    <div class="col-md-12">
      <div class="invoice-header-wrapper">
        <!-- TAB -->
        <ejs-tab id="element" cssClass="invoice-tabs">
          <e-tabitems>

            <e-tabitem>
              <ng-template #headerText>
                <div>Item Details</div>
              </ng-template>
              <ng-template #content>
                <app-item-list></app-item-list>
              </ng-template>
            </e-tabitem>

            <e-tabitem>
              <ng-template #headerText>
                <div>Additional Details</div>
              </ng-template>
              <ng-template #content>
                <app-additional-details></app-additional-details>
              </ng-template>
            </e-tabitem>


        <e-tabitem align="Right">
          <ng-template #headerText>
            <button type="button" class="btn btn-outline-primary" (click)="onBarcodeClick()">
              <span>BR</span>
            </button>
          </ng-template>
        </e-tabitem>
        <e-tabitem align="Right">
          <ng-template #headerText>
            <label class="form-label">Gross Amount Edit</label>
            <label class="switch">
              <input type="checkbox" [checked]="isGrossAmountEditable" (change)="onGrossAmountEditChange($event)">
              <span class="slider round"></span>
            </label>
          </ng-template>
        </e-tabitem>
        <e-tabitem align="Right">
          <ng-template #headerText>
            <label class="form-label">Approve</label>
            <label class="switch">
              <input type="checkbox" [checked]="isApproved" (change)="onApproveChange($event)">
              <span class="slider round"></span>
            </label>

          </ng-template>
        </e-tabitem>

        <e-tabitem align="Right">
          <ng-template #headerText>
            <div class="party-balance">
              <span>Party Balance : {{ partyBalance }}</span>
            </div>
          </ng-template>
        </e-tabitem>

      </e-tabitems>
    </ejs-tab>
    <!-- Custom Right-Side Controls -->

      </div>

    </div>


  </div>

  <div class="w-100">
    <app-invoice-footer (footerPopUpData)="handleSelectedItem($event)"></app-invoice-footer>
  </div>
  <!--  Footer Section -->
  <!-- <div class="row fixed-footer">
    <app-invoice-footer (footerPopUpData)="handleSelectedItem($event)"></app-invoice-footer>
  </div> -->
  <!-- Footer Section End   -->


  <div class="col-md-12 ">

  </div>
  <div class="col-md-12 ">
    <h2> </h2>
  </div>

</div>

<!-- Alert / confirmation dialog host (for viewDialog: unsaved changes, delete confirm, etc.) -->
<div id="alertDialog" #dialogAlert></div>
