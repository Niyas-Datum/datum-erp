<section class="p-1">
  <form [formGroup]="salesForm">

    <div class="row">

      <!-- LEFT SECTION -->
      <div class="col-12 col-lg-10">

        <!-- ROW 1 -->
        <div class="row">

          <!-- Voucher No -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">Voucher No</p>
              <div class="col-12 col-md-8 d-flex gap-1">
                <ejs-textbox formControlName="vouchername" cssClass="e-outline text-center" style="width:3rem"
                  [readonly]="true">
                </ejs-textbox>

                <ejs-textbox class="w-100" formControlName="voucherno" cssClass="e-outline flex-fill"
                  [readonly]="!(isNewMode() || isEditMode())">
                </ejs-textbox>
              </div>
            </div>
          </div>

          <!-- Date -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">Date</p>
              <div class="col-12 col-md-8">
                <ejs-datepicker class="w-100" cssClass="e-outline" formControlName="purchasedate" [disabled]="true">
                </ejs-datepicker>
              </div>
            </div>
          </div>

          <!-- Reference -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">Reference</p>
              <div class="col-12 col-md-8">
                <div class="e-input-group w-100 d-flex">

                  <ejs-textbox cssClass="e-outline w-100" formControlName="reference">
                  </ejs-textbox>

                  <span class="e-input-group-icon e-btn flex-shrink-0" (click)="openImportReferencePopup()">
                    <i class="e-icons e-search"></i>
                  </span>

                </div>

              </div>
            </div>
          </div>

          <!-- Warehouse -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-2">
              <p class="col-12 col-md-3 mb-0 font-size-custome form-label">Warehouse</p>
              <div class="col-12 col-md-9">
                <ejs-dropdownlist class="w-100" id="warehouse" cssClass="e-outline" formControlName="warehouse"
                  [dataSource]="warehouseData" virtu [fields]="{ text: 'value', value: 'id' }" placeholder="Select warehouse"
                  [value]="salesForm.get('warehouse')?.value" (change)="onChangeWarehouse($event)"
                  [disabled]="isMobile">
                </ejs-dropdownlist>
              </div>
            </div>
          </div>

        </div>

        <!-- ROW 2 -->
        <div class="row">

          <!-- Customer -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">
                Customer <span class="text-danger">*</span>
              </p>
              <div class="col-12 col-md-8">
                <div class="e-input-group w-100">
                  <ejs-textbox cssClass="e-outline" formControlName="customer"></ejs-textbox>
                  <span class="e-input-group-icon e-btn" (click)="openCustomerPopup()">
                    <i class="e-icons e-search"></i>
                  </span>
                </div>
              </div>
            </div>
          </div>

          <!-- VAT No -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">VAT No</p>
              <div class="col-12 col-md-8">
                <ejs-textbox class="w-100" cssClass="e-outline" formControlName="vatno"></ejs-textbox>
              </div>
            </div>
          </div>

          <!-- Sales Man -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-4 mb-0 font-size-custome form-label">Sales Man</p>
              <div class="col-12 col-md-8">
                <ejs-textbox class="w-100" cssClass="e-outline" formControlName="salesman"></ejs-textbox>
              </div>
            </div>
          </div>

          <!-- Party Invoice -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="row g-1">
              <p class="col-12 col-md-3 mb-0 font-size-custome">
                Party Inv<br> No & Date
              </p>
              <div class="col-12 col-md-9 d-flex gap-1">
                <ejs-textbox cssClass="e-outline" style="width: 4em;" formControlName="partyinvoiceno">
                </ejs-textbox>
                <ejs-datepicker class="flex-fill" cssClass="e-outline" formControlName="partyinvoicedate">
                </ejs-datepicker>
              </div>
            </div>
          </div>

        </div>

        <!-- ROW 3 -->
        <div class="row">

          <div class="col-12 col-lg-6">
            <div class="row g-1">
              <p class="col-12 col-md-2 mb-0 font-size-custome form-label">Project</p>
              <div class="col-12 col-md-10">
                <ejs-textbox class="w-100" cssClass="e-outline" formControlName="project"></ejs-textbox>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="row g-1">
              <p class="col-12 col-md-2 mb-0 font-size-custome form-label">Description</p>
              <div class="col-12 col-md-10">
                <ejs-textbox class="w-100" cssClass="e-outline" formControlName="description"></ejs-textbox>
              </div>
            </div>
          </div>

        </div>

      </div>

      <!-- RIGHT SECTION -->
      <div class="col-12 col-lg-2"></div>

    </div>
  </form>
</section>
